eureka:
  instance:
    prefer-ip-address: true
  client:
    registry-fetch-interval-seconds: 5

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/api/v1/auth/**, /api/v1/users/**, /api/v1/admin/**
            filters:
              - RewritePath=/api/v1/(?<segment>.*), /api/${segment}
          - id: movies-service
            uri: lb://movies-service
            predicates:
              - Path=/api/v1/movies/**, /api/v1/genres/**, /api/v1/reviews/**
            filters:
              - RewritePath=/api/v1/(?<segment>.*), /api/${segment}
