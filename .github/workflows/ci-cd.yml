name: CI/CD - Build and Docker Push

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:

  # ==================== TEST ====================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Test auth-service
        run: cd auth-service && mvn test -q

      - name: Test movies-service
        run: cd movies-service && mvn test -q

  # ==================== BUILD ====================
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build service-registry
        run: cd service-registry && mvn clean package -DskipTests -q

      - name: Build config-server
        run: cd config-server && mvn clean package -DskipTests -q

      - name: Build auth-service
        run: cd auth-service && mvn clean package -DskipTests -q

      - name: Build movies-service
        run: cd movies-service && mvn clean package -DskipTests -q

      - name: Build api-gateway
        run: cd api-gateway && mvn clean package -DskipTests -q

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            service-registry/target/*.jar
            config-server/target/*.jar
            auth-service/target/*.jar
            movies-service/target/*.jar
            api-gateway/target/*.jar

  # ==================== DOCKER ====================
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push service-registry
        uses: docker/build-push-action@v5
        with:
          context: ./service-registry
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/service-registry:latest

      - name: Build and push config-server
        uses: docker/build-push-action@v5
        with:
          context: ./config-server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/config-server:latest

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

      - name: Build and push movies-service
        uses: docker/build-push-action@v5
        with:
          context: ./movies-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/movies-service:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
