services:

  # ==================== BASES DE DATOS ====================

  mysql-auth:
    image: mysql:8.0
    container_name: movies-mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-movies:
    image: mysql:8.0
    container_name: movies-mysql-movies
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: movies_db
    ports:
      - "3308:3306"
    volumes:
      - mysql-movies-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: movies-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== INFRAESTRUCTURA ====================

  service-registry:
    image: estebanmm13/service-registry:latest
    container_name: movies-service-registry
    ports:
      - "8761:8761"
    environment:
      EUREKA_HOSTNAME: service-registry
      JAVA_OPTS: ${JAVA_OPTS:--Xmx256m -Xms128m}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  config-server:
    image: estebanmm13/config-server:latest
    container_name: movies-config-server
    ports:
      - "8088:8088"
    environment:
      EUREKA_URL: http://service-registry:8761/eureka/
      JAVA_OPTS: ${JAVA_OPTS:--Xmx256m -Xms128m}
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==================== MICROSERVICIOS ====================

  auth-service:
    image: estebanmm13/auth-service:latest
    container_name: movies-auth-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_URL: http://service-registry:8761/eureka/
      CONFIG_SERVER_URL: http://config-server:8088
      DB_AUTH_URL: jdbc:mysql://mysql-auth:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-1234}
      JWT_SECRET: ${JWT_SECRET:-2da08e8ee264a149413ce46abebbd566b4c8bbb019b37708ed9d77f8511ac7bf}
      JAVA_OPTS: ${JAVA_OPTS:--Xmx384m -Xms192m}
    depends_on:
      mysql-auth:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  movies-service:
    image: estebanmm13/movies-service:latest
    container_name: movies-movies-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_URL: http://service-registry:8761/eureka/
      CONFIG_SERVER_URL: http://config-server:8088
      DB_MOVIES_URL: jdbc:mysql://mysql-movies:3306/movies_db?useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASS: ${MYSQL_ROOT_PASSWORD:-1234}
      JWT_SECRET: ${JWT_SECRET:-2da08e8ee264a149413ce46abebbd566b4c8bbb019b37708ed9d77f8511ac7bf}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: ${JAVA_OPTS:--Xmx384m -Xms192m}
    depends_on:
      mysql-movies:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    image: estebanmm13/api-gateway:latest
    container_name: movies-api-gateway
    ports:
      - "8060:8060"
    environment:
      EUREKA_URL: http://service-registry:8761/eureka/
      CONFIG_SERVER_URL: http://config-server:8088
      JAVA_OPTS: ${JAVA_OPTS:--Xmx384m -Xms192m}
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ==================== OBSERVABILIDAD ====================

  prometheus:
    image: prom/prometheus:latest
    container_name: movies-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      auth-service:
        condition: service_healthy
      movies-service:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: movies-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  mysql-auth-data:
  mysql-movies-data:
  grafana-data:
